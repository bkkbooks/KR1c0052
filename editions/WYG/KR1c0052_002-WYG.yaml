body:
  text: 詩札卷二翰林院檢討毛竒齡撰謹奉教笙詩既無辭則其立名時何所取㫖走初亦信之既而臆樂部曽無徒立名者不取列詞義特以調行豈有此理即漢横吹曲李延年因胡曲更造新聲用為武樂皆有辭者且通有名若所傳黄華子赤之陽望行人等主臣謹奉教信彼南山維禹甸之此甸字當訓禹貢奠高山之奠奠甸音同亦通治㫖假作丘甸之甸則高山詎宜甸矣凡治田出榖稅曰甸耳畇畇原隰曾孫田之此原隰是地名即隰原與春秋傳沃野隰臯不同故可田假作地官大司徒職五曰原隰之原隰則與山林丘陵墳衍川澤相等又烏可田主臣謹奉教我取其陳食我農人謂取官庾之陳者以食之即後貸官法然但貸不收由古原有補助事未嘗取償如周禮遺人掌邦之委積以待施惠亦是矣至春秋始有施舎已責倍貸取庸之說則易法致弊耳或曰信爾則何以儆游惰是不知游惰自有罰此要是不幸使然非游惰者主臣謹奉教陳錫哉周傳與箋各主一訓傳以哉為載為載行周道此主國語芮良夫引此詩為布利載周故云然箋以哉為始為造周之始此主左傳羊舌職引此詩謂能施造周故云然但二說各有據各不相難按中庸栽者培之舊註引上天之載伊訓朕哉自亳孟子作朕載自亳此即以哉為載之㫖尚書哉生魄為始生魄爾雅曰哉始也舜典往哉汝諧古文作往才汝諧才纔也此即以哉為始之㫖主臣謹奉教追琢其章荀子富國篇劉向說苑通作彫琢毛傳亦云追彫也周禮有追師亦作彫又行葦詩敦弓作彫弓有客詩敦琢亦作彫琢敦追彫三字以雙聲轉之皆同此是音轉使然别無他㫖主臣謹奉教摯仲氏任是摯國之次女而氏任者鄒忠𦙍云漢儒謂但嫁長女餘通為媵殷以前皆然則摯任非邪走臆此如立嗣然正嫁以嫡無嫡以長嫁以仲必嫡故矣爾雅云同出有先生者曰姒同出謂同嫁者先生姊也則姊固有從媵者姊既有從媵則但嫁長女自為非㫖但必長庶耳若姑則不然姑雖庶無為姪媵者故媵曰娣姒又曰姪娣主臣謹奉教其德靡悔言其德從後計之必無可悔恨者必如是而德始純也周之君惟文為無可悔故孔子稱為無憂韓子曰道與德為虚位故德亦可悔易曰憂悔吝者存乎介震無咎者存乎悔皆是追悔之悔主臣謹奉教靈臺在漢京兆鄠縣三輔故事云在豐水東以豐水屬鄠故也若三輔黄圖云靈臺在長安西北四十里靈囿在長安西四十二里靈沼在長安西三十里據鄭駁異義即于臺下為囿沼又一統志云囿中有沼似不同但以詩文觀之首叙靈臺次即承之云在囿在沼則要不得逺耳且靈臺亦故不在長安西北凡黄圖所記莫有是者主臣謹奉教靈臺詎必與辟雍近後人以詩中連及之故云然走臆靈臺辟雍皆在郊特靈臺在東郊耳據文王作豐在鄠縣東豐水之西而三輔故事云靈臺在豐水東則豐水在豐東而靈臺又在豐水東故知靈臺在東郊也公羊所云靈臺在國之東南二十五里此可著也若夫辟雍在西郊據辟雍是周之太學然作之自文始故曰辟雍謂始為法則于雍耳而振鷺云于彼西雝則知在西而王制曰太學在郊則知在西郊也後漢左靈臺右辟雍本此主臣謹奉教公劉遷豳由戎狄來遷耳史記不窋失官竄戎狄間公劉乃修后稷之業而遷豳故孟子謂使居有積倉行有褁糧則于是方能啟行蓋亦畜積之久而後遷其發憤思大若唯恐遏佚前人光者所謂思戢用光矣曹氏曰不窋之居豳未能國也至公劉始立國焉此則以不窋為亦居豳耳信然則公劉又何用遷耶此謬矣特舊以公劉為自邰遷豳則又不然邰與豳相距止百餘里詎須積倉褁糧乃爾且其遷豳必近邰者正以公劉思舊土故特相度與邰不逺者而後居之要自不窋所竄戎狄間來遷耳設謂夏政衰逼逐公劉故遷豳更不然公劉久思啟大發憤震動非所用逼逐也必謂逼逐始遷是太王遷岐耳謂自邰遷豳是文王遷豐武王遷鎬耳通非㫖矣或曰不窋竄處無考按郡縣志慶州治東南三里有不窋故城或是耳主臣謹奉教公劉遷豳諸侯從之者十有八國其說縱不可畢信但從詩觀之于其相土則曰既庶既繁于其度邑則曰于時廬旅于其授田則曰度其夕陽豳居允荒于其定居則曰止旅之密芮鞫之即此通言曰國旅居者則或當時實有如是之從者未可知也其後太王遷岐而豳民復從之如市然則商民之戴周舊耳主臣謹奉教逝彼百泉瞻彼溥原百泉即朝那以豳地泉多故名也獨漙原無據走臆溥原衆原耳豳地多原如五龍原永夀原等故詩中于胥斯原度其隰原于六章凡三稱原則以衆原名漙原亦猶之以多水名百泉也主臣謹奉教維清詩序曰奏象舞也象是樂名如董子云武王作象樂是矣特不名象舞按禮記仲尼燕居曰升歌清廟下而管象則象是管曲非舞曲耳又按文王世子曰升歌清廟下管象舞大武則明象是管曲武是舞曲耳但仲尼燕居又云下管象武夏籥序興其以管象與夏籥對亦明是吹象以管吹夏以籥特象又加武不可解詎象者本象武功故云耶按祭統又云聲莫重于升歌舞莫重于武宿夜又以武宿夜與升歌並則疑武宿夜者或即象故維清詩舊有以為象曲者亦有以為武宿夜者總是以維清繼清廟管象繼清歌是故云也然此則又以武宿夜為象曲矣走臆以為象仍是象武仍是武其得稱象舞者考左傳襄二十九年季札論樂亦有見舞象箾南籥語臆象以管奏列在堂下故曰下管象然堂下合樂則必舞故又云象舞則舞雖舞武而亦得稱象舞也以管時不必不舞也至其稱象武則又以舞武時即管象故亦得稱象武也以象又武也此甚著也獨以維清詩為奏象舞則不然按祭統既以武宿夜為象曲矣又左傳見舞象箾服䖍註云箾舞曲名以天下樂削去無道故名箾則象已别有曲名矣且墨子謂武王自作樂名象武則象與武必皆武詩也今維清誦文王詎自作樂耶且文亦無武可象也或曰箾與武宿夜皆非象曲武宿夜即大武耳若其云象箾則吹象以箾故名此與吹南以籥名南籥正等特維清詩則斷非象曲耳主臣謹奉教無競維人四方其訓之訓是順字左傳哀二十二年子貢引詩作四方其順之是矣若曰順與馴同順之為訓以訓馴形近而誤則不然訓本有順㫖書畢命云子孫訓其成式亦作順其成式無逸云人乃訓之作順之主臣謹奉教於穆不已孟仲子說詩作於穆不似似續妣祖鄭箋又作已續妣祖此不可解走臆已以似古通字耳廣雅云己似也史記高帝記前者夫人太子皆似君漢書夫人太子皆以君可驗主臣謹奉教無競維人皆以人為賢人獨集傳以為莫强于人則屬前王與宣哲維人同但朱子論語章句其于子言衞靈公章註直引無競維人為解則又以為賢人矣前人說詩其亦初無定㫖如此主臣謹奉教成王不敢康舊以成王為成其王業如成王畏相之成先儒力辨其不然此但據國語道成王之德與成王能明文昭定武烈語耳按賈子新書有特為明註者曰后王也二后文王武王也成王者武王之子文王之孫也文王有大德而功未既武王有大功而治未成及成王承嗣仁以蒞民故稱昊天焉蚤興夜寐以繼文王之業懿然葆德各遵其道故曰有成賈誼漢儒先毛鄭其說詩如此主臣謹奉教耆定爾功左傳云耆致也耆定為致定是也若釋名又云耆指也皇矣詩上帝耆之王符論亦作上帝指之或曰耆固老也而亦有指義故文從老從㫖曲禮六十曰耆指使是也特以指之上濁又轉作致故致定即指定如書大誥云率寧人有指疆土註曰當有指定先王疆土之理此可著耳若鄭箋云耆老也武王老紂惡不急攻伐此雖是耆字本㫖然于武詩作樂象武意有未合矣無競之烈可以勝殷文王開之武繼而受之則與其垂老定之何如指顧定之耳主臣上帝耆之以耆為致此據左傳引武詩耆定爾功註耳然但以耆訓致不必致定如隨㑹引酌詩曰耆昧也註但曰致討于昧可驗耳今槩以致為致定遂以上帝耆之亦訓作致定之則竟以耆字為兼有耆定二字㫖矣莆田鄭氏曰耆底定也又曰天察四方之國而底定之其為誤亡以甚此而東萊取之不悟何也主臣謹奉教上帝耆之或曰耆嗜也楚茨神嗜飲食釋文作神耆飲食又禮記有耆欲將至孟子耆秦人之炙漢書亦曰穆生不耆酒又曰大臣驃騎將軍貪耆錢皆是耆字若曰苟上帝之所嗜者則當増大其規模主臣謹奉教臣工詩嗟嗟保介韓詩外傳以保介為保其介然之德是底義惟鄭箋以保為衣以介為甲言人君之車必有甲士為之驂乗所謂車右也此正與月令王乃親載耒耜指之於參保介之御間相合朱子又以保介為農官之副必謂車右與勸農定無關耳殊不悟車中四顧遂呼車右而詠嘆之亦無不可不然羣臣百官亦何必皆司農司嗇而矢口咨茹若是且農官亦幾見名保介者主臣謹奉教臣工小毖詩皆不用義盡處為韻如臣工詩來咨來茹與如何新畬合明昭上帝與奄觀銍艾合小毖詩莫予荓蜂與肇允彼桃蟲合拚飛惟鳥與予又集于蓼合漢鐃歌樂府曲與烏生八九子相和歌辭等用韻比視此主臣謹奉教生民篇末章于豆于豋其香始升上帝居歆豋升韻歆不韻后稷肇祀庶無罪悔以迄于今祀悔韻今又不韻實今歆隔合也後銘頌比視此野有蔓草章三韻合零露􅄎平也清揚婉上也適我願去也正月篇又窘陰雨乃棄爾輔將伯助予民勞篇迄可小安無俾正反是用大諌皆同後詞賦歌曲比視此主臣謹奉教桑柔篇畢轆轤韻如菀彼桑柔其下侯旬將采其劉瘼此下民柔與劉合旬與民合也若其卒章則又異是民之未戾職盗為冦凉曰不可覆背善詈雖曰匪予既作爾歌凡六句似通不韻者故朱子亦竟不能合耳按之則戾與詈合可與歌合此又扇對隔合與轆轤不同然又與卬盛于豆章隔合異矣考古字歌字作可故可亦音歌主臣謹奉教烈文篇首章烈文辟公錫兹祉福惠我無彊子孫保之以公疆合是首一句用韻者次章無封靡于爾邦惟王其崇之念茲戎功繼序其皇之以邦與皇合崇與功合又是交股用韻者此在古合中又一變格主臣謹奉教烈文篇末章無競維人四方其訓之不顯惟德百辟其刑之於乎前王不忘前四句以之助韻與我將篇同格末一句王與忘句中藏韻與東漢太學中諸謡同格主臣謹奉教載見篇半前比一句一用韻即漢栢梁詩格半後比三句一用韻即秦人功德碑格主臣謹奉教潛詩比二句一換合即六朝詩東飛伯勞歌格主臣謹奉教何彼穠矣與曷不肅雍隔合唐棣之華與王姬之車隔合此轆轤合法但華當合敷朱子獨不合華車二音初惑之既讀朱子語類有云合韻以頭韻為則設如有女同車是頭韻則次句顔如舜華當合敷如何彼穠矣唐棣之華是頭韻則華讀本音而以王姬之車車字讀尺奢彼以華車本奢音故耳殊不悟古文華無讀譁者爾雅云華荂也江東呼華為荂音敷釋文云古讀華為敷故鄭風顔如舜華珮玉瓊琚楚辭折疏麻兮瑶華將以遺兮離居可驗也若車字則古從無讀尺奢者易云見豕負塗載鬼一車國策歌云食無魚出無車淳于禳田辭云洿邪滿車洋洋有餘皆從車音故劉熈釋車云古者曰車聲如居言行所以居人也今曰車讀尺奢舍也行者所處若居舎也亦以古曰居今始曰尺奢耳若韋昭曰車字從漢始有居音此是妄語朱子語類未是也但困學紀詩謂朱子集傳並註二音以音敷為先考今本集傳並無此主臣毛詩合韻舊欲通輯之入韻錄一書今不能之矣曾與寫官辨莫往莫來詩多所去反故其語頗晰凡八九札今略其㫖存六札但其所引復則不遺之矣予謂來之與思灰之與支也灰以韻之轉而從支以灰之韻絶皆支音也此不必讀來為犁耳然古有易來為犁文者此不可通矣謹奉教集傳凡來字俱合犁字或間有不合則以來本入灰韻故遇他有灰韻者則祗從來字本音不合故終風且霾第音霾為埋不合貍且不合惠然肯來來字此皆以來本灰韻無俟轉合耳走則謂來字本音祗有犁音無所謂合也直讀犁矣縱遇他字入灰韻如霾字者亦直轉合從犁音其以來為灰韻者則後起之謬耳左傳于思于思棄甲復來呉鼓吹曲啟皇基垂將來穆天子傳道里悠逺山川間之將子無死尚能復來直讀犁詎獨此詩矣主臣謹奉教匡衡歌無說詩匡鼎來魏武氣出唱敬神齊道自來主臣謹奉教太公六韜云天下熈熈皆為利來黄帝巾機銘云操刀不割失利之期執斧不伐賊人將來樂府黄淡思歌歸歸黄淡思逐郎還去來此四字五字詩句俱爾且有六七字至長句如楚詞九歌云望夫君兮未來吹參差兮誰思栢梁詩云日月星辰昭四時驂駕駟馬從梁來龎士元於忽操束王良之手兮後車載之前行險既以覆兮後逐逐其猶來此何也主臣謹奉教來字詎翅讀犁即有竟從犁文者商國萊侯即犁侯矣伏羲扶來歌作扶犁歌此詎用韻也北山有萊謂􅁵蔓花也故北山有萊亦與邦家之基合若書帝告􅁵沃本帝嚳來沃詎合耳且劉向封事引詩貽我來牟作貽我􅁵牟此雖是詩字然非因底合又昭然者主臣謹奉教春秋公㑹鄭伯于時來公羊傳作祁黎即後滎陽縣之􅁵城也呉人伐州來春秋州來即鍾離為楚州犂采後更名名鍾離耳然則來即犂又即􅁵又即黎又即離矣主臣謹奉教大射貍首註云貍之言不來也射諸侯不來朝者故徐廣封禪書註云貍一名不來而方言又云􅆛陳楚江淮之間謂之䋱關西謂之貍則來故為貍即不來亦且為貍矣又公羊傳云觀魚于棠登來之也登來猶俗言得利也春秋楚滅賴穀梁作滅厲漢書無俚作無賴凡以利為來以俚為賴則即來音之轉猶尚有然者豈况本音故知來定無他音耳若闕厲合始為賴則就字訛字誰則合音以待之主臣謹奉教晉摯虞謂詩有九字如泂酌彼行潦挹彼注茲等顔延之非之謂詩體本無九字有則聲度闡緩不合金石矣此是耳今更謂有十一字詩如不稼不穡胡取禾三百廛不狩不獵胡瞻爾庭有懸貆以穡獵不韻而廛貆韻以是為十字十一字則七言詩比間句取韻也亦應稱十四字詩矣詩凡有可斷雖其中無韻亦别是一句如參差荇菜左右流之窈窕淑女寤寐求之雖菜女無韻不得稱為七字也有謂小招云涉江採菱發陽阿些羙人既醉朱顔酡些是齊梁七言之始則又寧云始于詩耳主臣謹奉教詩固以助上取韻然亦有否者如周頌我將之類是也我將詩以三之字合此即韋𤣥成詩赫赫顯爵自我隊之㣲㣲附庸自我招之之始人但不覺耳若他有偶取合一助如是究是圖亶其然乎等則從來詩句中多有然者主臣謹奉教或曰遘閔既多受侮不少是轉對之始楊柳依依雨雪霏霏是開對之始關關雎鳩在河之洲是承合之始抑抑威儀維德之隅是嫌合之始主臣謹奉教庶見素冠兮章三句合是大風歌之始嘒彼小星章四句兩合第五句又合是前溪歌之始于以采蘋章四句軒輊合是烏栖曲之始麟趾騶虞㳫句不合是董逃上留田之始主臣謹奉教毛鄭以敬之詩前章六句是羣臣進言後章六句是成王答言一詩兩截下此是倡體但一人可作數詩無可數人作一詩者故朱子以上章為成王述羣臣之言下章為自作答言此即杜工部短歌行贈王司直詩以前五句代王司直言後五句自作答言所始主臣謹奉教那詩毛傳作一章朱子判作五章然仍曰一章二十二句按魯語閔馬父引自古在昔四句為輯之亂說詩者謂不宜合作一章但從來詩章判節與樂章判節不同詩本一章而作樂者必分解之故詩可合一而樂則斷無不解之例如樂府東門行本一章而晉樂一章所奏判作四解魏文艷歌何嘗行本七章而晉樂所奏判前一章為艷後一章為趨此明著也那詩雖一章然閔馬父以樂章例之則有輯有亂故朱子既為判之復為合之或是㫖耳但樂章分解自為節次不以韻義為起絶假如清廟詩比一句一唱三嘆而成四韻則一句自為一章而武詩於皇武王本七句左傳云其卒章曰耆定爾功則亦一句為一章者故清廟維清般武諸詩俱通體無韻然則分解節次原不必拘限韻㫖如朱子所分者且其曰輯成也以樂之既成則輯之以為亂此猶繹如以成之成然亦可解作趨如樂府前為豔後為趨趨促也言樂當急促也輯趨促字音之轉耳蓋樂有緩急當其既急則雖關雎之大篇而可以為輯當其尚緩則必以我行其野之短章而始以為亂此易曉矣故那詩顧予蒸嘗二語向嘗答㫖以為當是羡辭緣閔馬父引詩無此二語臆是次詩烈祖篇末兩句錯簡在此此如魏文臨高臺篇以中有黄鵠語遂取黄鵠行古辭雜之一例今按之此兩句兩詩並列或如信南山甫田末報以介福萬夀無疆樂府延年萬歲期陛下夀萬年等當是樂例未可知也信然則此又在亂之外别是一體猶楚辭湘君湘夫人兩歌其末章皆有捐予珮兮江中四語可驗也但古樂既亡不能確行其說耳主臣謹奉教天命多辟設都于禹之績此用兵時也而遽逮拓地何也亦曰用兵正為拓地計耳守文者不用兵則國日蹙故立政曰其克詰爾戎兵以陟禹之跡方行天下與此詩正同召旻曰昔也日闢國百里今也日蹙國百里故周以啓江漢而興以失汧渭而衰漢以開緣邊而疆以捐珠崖而弱主臣詩札卷二
